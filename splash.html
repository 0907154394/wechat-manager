<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #060c18;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: #dde6f5;
        user-select: none;
        overflow: hidden;
    }

    /* Subtle background glow */
    body::before {
        content: '';
        position: fixed;
        top: 30%; left: 50%;
        transform: translate(-50%, -50%);
        width: 500px; height: 300px;
        background: radial-gradient(ellipse, rgba(91,124,247,.07) 0%, transparent 70%);
        pointer-events: none;
        animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
        0%, 100% { opacity: .6; }
        50%       { opacity: 1; }
    }

    .splash {
        text-align: center;
        animation: fadeIn .4s ease both;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(.96); }
        to   { opacity: 1; transform: scale(1); }
    }

    .logo {
        width: 68px; height: 68px;
        background: linear-gradient(135deg, #5b7cf7, #a78bfa);
        border-radius: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        font-weight: 900;
        color: #fff;
        margin-bottom: 18px;
        box-shadow: 0 8px 32px rgba(91,124,247,.35);
        animation: logoPulse 2.4s ease-in-out infinite;
    }

    @keyframes logoPulse {
        0%, 100% { box-shadow: 0 8px 32px rgba(91,124,247,.35); }
        50%       { box-shadow: 0 8px 52px rgba(91,124,247,.65); }
    }

    .app-name {
        font-size: 20px;
        font-weight: 700;
        color: #dde6f5;
        margin-bottom: 6px;
        animation: fadeIn .4s .1s ease both;
    }

    .status {
        font-size: 13px;
        color: #4d6a91;
        margin-bottom: 32px;
        animation: fadeIn .4s .2s ease both;
    }

    .dots {
        display: flex;
        gap: 9px;
        justify-content: center;
        animation: fadeIn .4s .3s ease both;
    }

    .dot {
        width: 7px; height: 7px;
        background: #5b7cf7;
        border-radius: 50%;
        animation: dotBounce 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; background: #7b9af9; }
    .dot:nth-child(3) { animation-delay: .4s; background: #a78bfa; }

    @keyframes dotBounce {
        0%, 80%, 100% { opacity: .25; transform: scale(.65); }
        40%            { opacity: 1;   transform: scale(1); }
    }
</style>
</head>
<body>
    <div class="splash">
        <div class="logo">W</div>
        <div class="app-name">WeChat Manager</div>
        <div class="status">Đang khởi động...</div>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
</body>
</html>
