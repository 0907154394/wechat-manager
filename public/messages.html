<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Danh sách tin nhắn</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1220;
            color: #fff;
            padding: 20px;
        }

        h1 {
            margin-bottom: 8px;
        }

        .sub {
            color: #9fb3d9;
            margin-bottom: 20px;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            background: #2b7fff;
            color: white;
            font-weight: bold;
        }

        .list {
            display: grid;
            gap: 16px;
        }

        .card {
            background: #111a2e;
            border: 1px solid #22304f;
            border-radius: 14px;
            padding: 16px;
        }

        .subject {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .meta {
            font-size: 13px;
            color: #9fb3d9;
            margin-bottom: 10px;
        }

        .code {
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            color: #7fffd4;
            margin: 8px 0;
        }

        .content {
            white-space: pre-wrap;
            line-height: 1.5;
            color: #dfe8ff;
        }
    </style>
</head>
<body>
    <h1>Danh sách tin nhắn</h1>
    <div class="sub">Bạn đang xem hộp thư qua link được cấp riêng.</div>

    <div class="toolbar">
        <button onclick="loadMessages()">Tải lại</button>
    </div>

    <div id="list" class="list"></div>

    <script>
        function getLinkTokenFromPath() {
            const path = window.location.pathname;
            const match = path.match(/^\/m\/([^/?#]+)$/);

            if (match && match[1]) {
                return decodeURIComponent(match[1]);
            }

            return "";
        }

        async function loadMessages() {
            const list = document.getElementById("list");
            const linkToken = getLinkTokenFromPath();

            if (!linkToken) {
                list.innerHTML = "<div class='card'>Link không hợp lệ.</div>";
                return;
            }

            list.innerHTML = "<div class='card'>Đang tải...</div>";

            try {
                const res = await fetch("/api/messages/public/" + encodeURIComponent(linkToken), {
                    headers: {
                        Accept: "application/json"
                    }
                });

                const data = await safeJson(res);

                if (!res.ok) {
                    list.innerHTML =
                        "<div class='card'>" +
                        escapeHtml(data.message || "Không tải được tin nhắn") +
                        "</div>";
                    return;
                }

                if (!Array.isArray(data) || data.length === 0) {
                    list.innerHTML = "<div class='card'>Chưa có tin nhắn nào.</div>";
                    return;
                }

                list.innerHTML = data.map((item) => `
                    <div class="card">
                        <div class="subject">${escapeHtml(item.subject || "(Không có tiêu đề)")}</div>
                        <div class="meta">
                            Từ: ${escapeHtml(item.sender || "Unknown")}<br>
                            Lúc: ${item.createdAt ? escapeHtml(new Date(item.createdAt).toLocaleString()) : ""}
                        </div>
                        ${item.code ? `<div class="code">${escapeHtml(item.code)}</div>` : ""}
                        <div class="content">${escapeHtml(item.content || "")}</div>
                    </div>
                `).join("");
            } catch (err) {
                list.innerHTML =
                    "<div class='card'>Lỗi tải dữ liệu: " +
                    escapeHtml(err.message || "Unknown error") +
                    "</div>";
            }
        }

        async function safeJson(res) {
            const text = await res.text();

            try {
                return text ? JSON.parse(text) : {};
            } catch {
                return { message: text || "Phản hồi không hợp lệ từ server" };
            }
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        loadMessages();
    </script>
</body>
</html>
