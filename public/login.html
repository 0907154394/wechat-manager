<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — WeChat Manager</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #060c18;
            color: #dde6f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .wrap {
            width: 100%;
            max-width: 380px;
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-logo {
            display: inline-flex;
            width: 52px; height: 52px;
            background: linear-gradient(135deg, #5b7cf7, #a78bfa);
            border-radius: 14px;
            align-items: center; justify-content: center;
            font-size: 22px; font-weight: 900; color: #fff;
            margin-bottom: 14px;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 700;
            color: #dde6f5;
        }

        .brand-sub {
            font-size: 13px;
            color: #4d6a91;
            margin-top: 4px;
        }

        .login-card {
            background: #0f1e35;
            border: 1px solid rgba(99,130,220,.18);
            border-radius: 20px;
            padding: 30px 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,.5);
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(91,124,247,.6), transparent);
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #7e96b8;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(99,130,220,.18);
            border-radius: 10px;
            background: #060c18;
            color: #dde6f5;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        input::placeholder { color: #2d4060; }
        input:focus {
            border-color: #5b7cf7;
            box-shadow: 0 0 0 3px rgba(91,124,247,.2);
        }

        .field { margin-bottom: 20px; }

        .login-btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #5b7cf7, #4a6de8);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: opacity .2s, transform .15s, box-shadow .2s;
        }
        .login-btn:hover {
            opacity: .92;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(91,124,247,.4);
        }
        .login-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

        .error-msg {
            margin-top: 14px;
            padding: 10px 14px;
            background: rgba(239,68,68,.1);
            border: 1px solid rgba(239,68,68,.25);
            border-radius: 8px;
            color: #fca5a5;
            font-size: 13px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="brand">
            <div class="brand-logo">W</div>
            <div class="brand-name">WeChat Manager</div>
            <div class="brand-sub">Trang quản trị nội bộ</div>
        </div>

        <div class="login-card">
            <div class="field">
                <label for="password">Mật khẩu</label>
                <input
                    id="password"
                    type="password"
                    placeholder="Nhập mật khẩu..."
                    autocomplete="current-password"
                    onkeydown="if(event.key==='Enter') login()"
                >
            </div>

            <button id="loginBtn" class="login-btn" onclick="login()">
                Đăng nhập
            </button>

            <div id="error" class="error-msg"></div>
        </div>
    </div>

    <script>
        if (localStorage.getItem("adminToken")) {
            window.location.replace("/");
        }

        async function login() {
            const password = document.getElementById("password").value.trim();
            const btn  = document.getElementById("loginBtn");
            const errEl = document.getElementById("error");

            errEl.style.display = "none";
            if (!password) {
                errEl.textContent = "Vui lòng nhập mật khẩu";
                errEl.style.display = "block";
                return;
            }

            btn.disabled = true;
            btn.textContent = "Đang đăng nhập...";

            try {
                const res  = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password })
                });
                const data = await res.json().catch(() => ({}));

                if (!res.ok) {
                    errEl.textContent = data.message || "Sai mật khẩu";
                    errEl.style.display = "block";
                    return;
                }

                localStorage.setItem("adminToken", data.token);
                window.location.replace("/");
            } catch {
                errEl.textContent = "Lỗi kết nối server";
                errEl.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "Đăng nhập";
            }
        }
    </script>
</body>
</html>
